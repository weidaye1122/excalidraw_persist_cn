services:
  excalidraw-selfhost:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: excalidraw-selfhost
    ports:
      - "3000:3000"
    environment:
      AUTH_PASSWORD: change-this-password
      SESSION_SECRET: change-this-session-secret
      DB_PATH: /app/data/database.sqlite
      PORT: 3000
      HOST: 0.0.0.0
      COOKIE_SECURE: "false"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
